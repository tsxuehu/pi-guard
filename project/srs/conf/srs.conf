listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
}

stats {
    network         0;
}

vhost __defaultVhost__ {
    min_latency     on;
    tcp_nodelay     on;

    publish {
        mr          off;
    }

    play {
        gop_cache   on;
        queue_length 10;
    }

    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    6;
        hls_window      60;
        hls_cleanup     on;
        hls_dispose     0;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
    }

    dvr {
        enabled         off;
    }

    http_hooks {
        enabled         on;
        on_publish      http://127.0.0.1:3000/api/srs/on_publish;
        on_unpublish    http://127.0.0.1:3000/api/srs/on_unpublish;
        on_hls          http://127.0.0.1:3000/api/srs/on_hls;
    }
}
